# ============================================================
# FinBot — docker-compose.yml
# Runs backend + frontend as two services
# Usage: docker-compose up --build
# ============================================================

version: "3.9"

services:

  # ── FastAPI Backend ───────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: finbot-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount chroma_db so data persists between restarts
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ── Streamlit Frontend ────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: finbot-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
